version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: generic-nest-prisma-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: generic_nest_prisma
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - generic-nest-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: generic-nest-prisma-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: generic_nest_prisma
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/generic_nest_prisma?schema=public
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    networks:
      - generic-nest-network
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres_data:

networks:
  generic-nest-network:
    driver: bridge
